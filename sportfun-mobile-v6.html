<!DOCTYPE html>
<html lang="en" data-theme="black">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>sport.fun</title>
<style>
:root{--out:cubic-bezier(.16,1,.3,1);--r:14px;--rs:10px;--rx:6px;--font:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;--mono:'SF Mono',Menlo,Monaco,monospace}
[data-theme="black"]{--bg:#000;--bg2:#0a0a0c;--bg3:#131316;--card:rgba(14,14,17,.97);--hover:rgba(255,255,255,.04);--active:rgba(255,255,255,.07);--brd:rgba(255,255,255,.065);--brd2:rgba(255,255,255,.11);--t1:#fff;--t2:rgba(255,255,255,.6);--t3:rgba(255,255,255,.38);--green:#00C853;--red:#FF1744;--yellow:#FFAB00;--blue:#2979FF;--purple:#D500F9;--mg:rgba(0,200,83,.55);--mr:rgba(255,23,68,.55);--glass:rgba(8,8,10,.92);--shadow:0 1px 4px rgba(0,0,0,.25);--shDark:#0a0a0e;--ct:rgba(255,255,255,.9);--grain:.025}
[data-theme="light"]{--bg:#e8e8ec;--bg2:#f2f2f5;--bg3:#fafafe;--card:rgba(255,255,255,.96);--hover:rgba(0,0,0,.025);--active:rgba(0,0,0,.05);--brd:rgba(0,0,0,.08);--brd2:rgba(0,0,0,.12);--t1:#1d1d1f;--t2:rgba(29,29,31,.6);--t3:rgba(29,29,31,.38);--green:#00A844;--red:#D32F2F;--yellow:#F57F17;--blue:#1565C0;--purple:#9C27B0;--mg:rgba(0,168,68,.55);--mr:rgba(211,47,47,.55);--glass:rgba(255,255,255,.92);--shadow:0 1px 2px rgba(0,0,0,.05);--shDark:#1a1a1e;--ct:rgba(29,29,31,.88);--grain:.008}
[data-theme="purple"]{--bg:#06031c;--bg2:#0b0824;--bg3:#130e34;--card:rgba(16,12,44,.97);--hover:rgba(160,100,255,.04);--active:rgba(160,100,255,.07);--brd:rgba(160,100,255,.09);--brd2:rgba(160,100,255,.14);--t1:#f0e8ff;--t2:rgba(230,215,255,.6);--t3:rgba(230,215,255,.38);--green:#69F0AE;--red:#FF5252;--yellow:#FFD740;--blue:#82B1FF;--purple:#EA80FC;--mg:rgba(105,240,174,.55);--mr:rgba(255,82,82,.55);--glass:rgba(14,10,40,.92);--shadow:0 1px 4px rgba(5,2,26,.35);--shDark:#0a0620;--ct:rgba(240,232,255,.9);--grain:.03}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;min-height:100dvh;overflow-x:hidden;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;z-index:10000;pointer-events:none;opacity:var(--grain);mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
::-webkit-scrollbar{display:none}

/* ═══ HEADER ═══ */
.hdr{position:sticky;top:0;z-index:100;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));background:var(--glass);backdrop-filter:blur(30px) saturate(1.5);border-bottom:1px solid var(--brd)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:7px}.lp{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease infinite;flex-shrink:0}@keyframes pulse{0%,100%{box-shadow:0 0 5px var(--green);transform:scale(1)}50%{box-shadow:0 0 14px var(--green);transform:scale(1.15)}}.lt{font-size:17px;font-weight:800;letter-spacing:-.3px}.ld{font-weight:400;color:var(--t2)}
.hdr-r{display:flex;align-items:center;gap:8px}
.chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;background:var(--active);font-size:11px;font-weight:700;font-family:var(--mono)}.chip i{width:5px;height:5px;border-radius:50%;background:var(--green)}
.thbtn{padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;border:1.5px solid var(--brd);background:none;color:var(--t2);cursor:pointer;font-family:var(--font)}
.av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--active));border:2px solid var(--brd2)}
.pills{display:flex;gap:3px}.pill{padding:5px 14px;border-radius:16px;font-size:11px;font-weight:600;border:1.5px solid var(--brd);background:none;color:var(--t2);font-family:var(--font)}.pill.on{background:var(--t1);color:var(--bg);border-color:var(--t1)}
nav{display:flex;gap:1px;background:var(--hover);border-radius:var(--rs);padding:2px;margin-top:8px}nav a{flex:1;text-align:center;padding:6px;border-radius:7px;font-size:12px;font-weight:500;color:var(--t3);text-decoration:none}nav a.on{color:var(--t1);background:var(--active);font-weight:600}

/* ═══ CONTENT ═══ */
.content{padding:10px 12px;padding-bottom:max(80px,calc(60px + env(safe-area-inset-bottom)))}

/* Stats strip */
.stats-strip{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.ss-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:12px;box-shadow:var(--shadow)}
.ss-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;color:var(--t3);margin-bottom:3px}
.ss-val{font-size:20px;font-weight:900;font-family:var(--mono);letter-spacing:-1px;color:var(--mg)}.ss-sub{font-size:10px;color:var(--t3);margin-top:2px;font-family:var(--mono)}

/* Pulse header */
.pulse-h{display:flex;align-items:center;justify-content:space-between;padding:10px 0;margin-bottom:4px}
.pulse-t{font-size:14px;font-weight:700;display:flex;align-items:center;gap:5px}.pulse-d{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s ease infinite}
.pulse-v{font-size:10px;color:var(--t3)}

/* ═══ PLAYER CARD ═══ */
.pc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);margin-bottom:6px;overflow:hidden;box-shadow:var(--shadow);position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent}
.pc:active{background:var(--hover)}
.pc-bar{position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0}
.pc-inner{padding:12px 14px 10px 12px}
/* Row 1: jersey, name, price */
.pc-r1{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.jm{width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center}.jm svg{width:32px;height:32px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.25))}
.pc-name{font-size:15px;font-weight:700;letter-spacing:-.15px;flex:1;display:flex;align-items:center;gap:5px}.pc-name svg{width:14px;height:8px;stroke:var(--t3);stroke-width:2;fill:none}
.pc-price{font-size:15px;font-weight:800;font-family:var(--mono)}
.pc-chg{font-size:11px;font-weight:700;font-family:var(--mono);margin-left:4px}
/* Row 2: meta */
.pc-r2{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding-left:44px}
.pc-meta{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t3)}.pc-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.pc-tag{font-size:8.5px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--active);color:var(--t3);text-transform:uppercase}
/* Row 3: comment ticker — bright, no fade */
.pc-cmt{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--hover);border-radius:var(--rx);margin-bottom:6px;margin-left:44px;min-height:30px}
.pc-cu{font-size:9px;color:var(--t2);font-weight:700;flex-shrink:0}
.pc-ct{font-size:12px;color:var(--ct);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
/* Row 4: emojis + actions */
.pc-r4{display:flex;align-items:center;justify-content:space-between;padding-left:44px}
.pc-emos{display:flex;gap:4px}.emo{display:flex;align-items:center;gap:1px;cursor:pointer;-webkit-user-select:none}.emo .f{font-size:13px;opacity:.2;filter:grayscale(1);transition:opacity .3s,filter .3s}.emo.flash .f{opacity:1;filter:grayscale(0)}.emo .n{font-size:9px;font-family:var(--mono);font-weight:600;color:var(--t3);transition:color .3s,transform .15s}.emo .n.bmp{transform:scale(1.3);color:var(--t1)}
.pc-btns{display:flex;gap:3px}.ab{padding:6px 14px;border-radius:var(--rx);font-size:11px;font-weight:700;border:none;font-family:var(--font)}.ab.bk{background:rgba(0,200,83,.1);color:var(--green)}.ab.fd{background:rgba(255,23,68,.1);color:var(--red)}

/* ═══ PLAYER POPUP SHEET ═══ */
.sheet{position:fixed;inset:0;z-index:200;background:var(--bg);transform:translateY(100%);transition:transform .35s var(--out);overflow-y:auto;-webkit-overflow-scrolling:touch}
.sheet.open{transform:translateY(0)}
.sh-hero{position:relative;padding:16px;padding-top:max(16px,env(safe-area-inset-top));min-height:100px;overflow:hidden}
.sh-bg{position:absolute;inset:0;z-index:0}.sh-noise{position:absolute;inset:0;z-index:1;opacity:.08;pointer-events:none;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px}
.sh-close{position:absolute;top:max(12px,env(safe-area-inset-top));right:14px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.3);backdrop-filter:blur(8px);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:2}
.sh-info{position:relative;z-index:1}.sh-name{font-size:24px;font-weight:900;letter-spacing:-.6px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.5)}.sh-meta{font-size:12px;color:rgba(255,255,255,.55);display:flex;gap:8px;align-items:center;margin-top:3px}.sh-pos{padding:3px 8px;border-radius:5px;background:rgba(255,255,255,.1);font-size:10px;font-weight:700}.sh-tag{padding:2px 6px;border-radius:4px;background:rgba(0,0,0,.3);color:rgba(255,255,255,.5);font-size:9px;font-weight:700;text-transform:uppercase}
.sh-body{padding:14px 16px;padding-bottom:max(30px,env(safe-area-inset-bottom))}
.sh-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px}.pws{padding:8px;background:var(--hover);border:1px solid var(--brd);border-radius:var(--rs);text-align:center}.pws-v{font-size:15px;font-weight:800;font-family:var(--mono)}.pws-l{font-size:8px;color:var(--t3);text-transform:uppercase;margin-top:1px;font-weight:600}
.sh-chart{height:80px;border-radius:var(--rs);overflow:hidden;background:var(--hover);border:1px solid var(--brd);margin-bottom:10px}.sh-chart canvas{display:block;width:100%;height:100%}
/* Value score ring */
.vs-ring{display:flex;align-items:center;gap:14px;padding:12px;background:var(--hover);border:1px solid var(--brd);border-radius:var(--rs);margin-bottom:10px}
.vs-circle{width:52px;height:52px;position:relative;flex-shrink:0}.vs-circle svg{display:block;transform:rotate(-90deg)}.vs-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;font-family:var(--mono)}
.vs-details{flex:1}.vs-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.vs-bars{display:flex;flex-direction:column;gap:4px}.vs-bar-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--t2)}.vs-bar-row span:first-child{width:60px;text-align:right;font-size:9px;color:var(--t3)}.vs-bar-track{flex:1;height:5px;background:var(--hover);border-radius:4px;overflow:hidden}.vs-bar-fill{height:100%;border-radius:4px}
/* Crowd split */
.sh-crowd{display:flex;justify-content:space-between;padding:8px 0;font-size:12px;font-weight:700;font-family:var(--mono);border-top:1px solid var(--brd);margin-bottom:8px}.sh-bk{color:var(--green)}.sh-fd{color:var(--red)}
/* Action buttons */
.sh-btns{display:flex;gap:4px;margin-bottom:10px}.sh-btn{flex:1;padding:12px;border-radius:var(--rs);font-size:14px;font-weight:700;border:none;font-family:var(--font);text-align:center;cursor:pointer}.sh-btn.bk{background:rgba(0,200,83,.15);color:var(--green)}.sh-btn.bk:active{background:rgba(0,200,83,.25)}.sh-btn.fd{background:rgba(255,23,68,.15);color:var(--red)}.sh-btn.fd:active{background:rgba(255,23,68,.25)}
/* Snap button */
.snap-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;border-radius:var(--rs);border:1.5px solid var(--brd);background:var(--hover);color:var(--t2);font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;margin-bottom:12px}.snap-btn:active{background:var(--active)}.snap-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
/* Live chat */
.lc{border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.lc-h{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--brd);background:var(--card)}
.lc-t{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}.lc-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.5s ease infinite}
.lc-cnt{font-size:10px;color:var(--t3);font-family:var(--mono)}
.lc-msgs{max-height:200px;overflow-y:auto;padding:8px 10px;background:var(--bg2)}
.lc-msg{display:flex;align-items:flex-start;gap:7px;padding:5px 6px;border-radius:var(--rx);margin-bottom:2px;animation:msgIn .25s var(--out)}.lc-msg:hover{background:var(--hover)}@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.lc-avi{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:var(--t3);flex-shrink:0;background:var(--active)}
.lc-user{font-size:10px;font-weight:600;color:var(--t3);display:inline;margin-right:5px}
.lc-text{font-size:12px;color:var(--t1);display:inline;font-weight:600;line-height:1.4}
.lc-inp{padding:8px 10px;border-top:1px solid var(--brd);display:flex;gap:5px;background:var(--bg3)}.lc-inp input{flex:1;padding:8px 12px;border-radius:18px;border:1.5px solid var(--brd);background:var(--hover);color:var(--t1);font-size:12px;font-family:var(--font);outline:none}.lc-inp input:focus{border-color:var(--green)}.lc-inp input::placeholder{color:var(--t3)}.lc-inp button{width:32px;height:32px;border-radius:50%;border:none;background:var(--green);color:#000;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* News */
.sh-sec{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.sh-ni{padding:6px 0;border-bottom:1px solid var(--brd)}.sh-ni:last-child{border:none}.sh-nt{font-size:9px;color:var(--t3);font-family:var(--mono)}.sh-ntxt{font-size:12px;color:var(--t2);line-height:1.35;margin-top:1px}

/* Snap overlay */
.so{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:10px}.so.open{display:flex;animation:fu .25s var(--out)}@keyframes fu{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}.sop{width:100%;max-width:280px;aspect-ratio:9/16;border-radius:var(--r);overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.6)}.sop canvas{width:100%;height:100%;display:block}.soa{display:flex;gap:8px;width:100%;max-width:280px}.sob{flex:1;padding:12px;border-radius:var(--rs);border:none;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;text-align:center}.sob.p{background:#00C853;color:#000}.sob.s{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.1)}

/* Theme dropdown */
.tdd{position:fixed;top:auto;right:12px;top:max(54px,calc(env(safe-area-inset-top)+48px));background:var(--bg3);border:1px solid var(--brd2);border-radius:var(--rs);padding:4px;display:none;z-index:300;min-width:140px;box-shadow:0 10px 40px rgba(0,0,0,.5)}.tdd.open{display:block;animation:ddIn .18s var(--out)}@keyframes ddIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}.topt{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;font-size:12px;font-weight:600;color:var(--t2);border:none;background:none;width:100%;font-family:var(--font)}.topt.on{color:var(--green);font-weight:700}.tsw{width:13px;height:13px;border-radius:50%;border:2px solid var(--brd2);flex-shrink:0}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top"><div class="logo"><span class="lp"></span><span class="lt">sport<span class="ld">.fun</span></span></div><div class="hdr-r"><div class="chip"><i></i>12K</div><button class="thbtn" id="thBtn" onclick="event.stopPropagation();document.getElementById('thDd').classList.toggle('open')">Black</button><div class="av"></div></div></div>
  <div class="pills"><button class="pill on">Football</button><button class="pill">NFL</button><button class="pill">NBA</button></div>
  <nav><a class="on">Home</a><a>Squad</a><a>Transfer</a><a>Live</a></nav>
</div>
<div class="content">
  <div class="stats-strip"><div class="ss-card"><div class="ss-label">Squad Value</div><div class="ss-val">$34K</div><div class="ss-sub" style="color:var(--mg)">↑ +200%</div></div><div class="ss-card"><div class="ss-label">Your TP</div><div class="ss-val" style="font-size:18px">+11,729</div><div class="ss-sub">$200 projected</div></div></div>
  <div class="pulse-h"><div class="pulse-t"><span class="pulse-d"></span>Squad Pulse</div><div class="pulse-v">Sort: Movers ▾</div></div>
  <div id="playerList"></div>
</div>
<div class="sheet" id="sheet"></div>
<div class="so" id="snapOv"><div class="sop"><canvas id="snapCv"></canvas></div><div class="soa"><button class="sob s" onclick="cSnap()">Close</button><button class="sob p" onclick="dSnap()">Save</button></div></div>
<div class="tdd" id="thDd"><button class="topt on" data-theme="black"><span class="tsw" style="background:#000;border-color:rgba(255,255,255,.2)"></span>Black</button><button class="topt" data-theme="light"><span class="tsw" style="background:linear-gradient(135deg,#e0e0e4,#c8c8cc);border-color:rgba(0,0,0,.15)"></span>Light</button><button class="topt" data-theme="purple"><span class="tsw" style="background:linear-gradient(135deg,#1a1040,#3d1b90);border-color:rgba(160,100,255,.3)"></span>Purple</button></div>
<script>
function iCh(u){return u.replace('@','').charAt(0).toUpperCase()}
function ji(j1,j2,num,pat,sz){
  sz=sz||32;const pid='p'+Math.random().toString(36).substr(2,5);
  const mkG=(s)=>`<defs><linearGradient id="${pid}" ${s.d||'x1="0" y1="0" x2="1" y2="1"'}>${s.s.map(s=>`<stop offset="${s[0]}" stop-color="${s[1]}"/>`).join('')}</linearGradient></defs>`;
  let d;
  if(pat==='hoops')d=mkG({d:'x1="0" y1="0" x2="0" y2="1"',s:[['0%',j1],['30%',j1],['30%',j2],['55%',j2],['55%',j1],['80%',j1],['80%',j2],['100%',j2]]});
  else if(pat==='vstripe')d=mkG({d:'x1="0" y1="0" x2="1" y2="0"',s:[['0%',j1],['35%',j1],['35%',j2],['65%',j2],['65%',j1],['100%',j1]]});
  else if(pat==='halves')d=mkG({d:'x1="0" y1="0" x2="1" y2="0"',s:[['0%',j1],['49%',j1],['51%',j2],['100%',j2]]});

function oSnap(){if(!curP)return;const p=curP;document.getElementById('snapOv').classList.add('open');const cv=document.getElementById('snapCv');const W=1080,H=1920;cv.width=W;cv.height=H;const ctx=cv.getContext('2d');ctx.fillStyle='#0c0c10';ctx.fillRect(0,0,W,H);const tg=ctx.createLinearGradient(0,0,W*.3,H*.25);tg.addColorStop(0,p.j1);tg.addColorStop(.5,p.j2);tg.addColorStop(1,'#0c0c10');ctx.fillStyle=tg;ctx.fillRect(0,0,W,H*.25);ctx.save();ctx.font='800 24px -apple-system';ctx.fillStyle='rgba(255,255,255,.5)';ctx.textAlign='left';ctx.fillText('sport',56,62);const sw=ctx.measureText('sport').width;ctx.font='400 24px -apple-system';ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillText('.fun',56+sw,62);ctx.beginPath();ctx.arc(40,56,5,0,Math.PI*2);ctx.fillStyle='#00C853';ctx.fill();ctx.restore();const cx2=W*.5,jy=H*.14,jr=100;const cg=ctx.createLinearGradient(cx2-jr,jy-jr,cx2+jr,jy+jr);cg.addColorStop(0,p.j1);cg.addColorStop(1,p.j2);ctx.beginPath();ctx.arc(cx2,jy,jr,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();ctx.font='900 72px -apple-system';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=14;ctx.fillText(p.num,cx2,jy);ctx.shadowBlur=0;ctx.font='900 52px -apple-system';ctx.textBaseline='top';ctx.fillText(p.n.toUpperCase(),cx2,H*.22);ctx.font='500 20px -apple-system';ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillText(`${p.full} · ${p.p}`,cx2,H*.22+58);const snap=MEMES[~~(Math.random()*MEMES.length)].replace(/\{n\}/g,p.n.toUpperCase());ctx.font='900 48px -apple-system';ctx.fillStyle='#fff';const sL=snap.split('\n');let fL=[];for(const sl of sL){const w=sl.split(' ');let l='';for(const x of w){const t=l?l+' '+x:x;if(ctx.measureText(t).width>W-100){fL.push(l);l=x}else l=t}if(l)fL.push(l)}const mY=H*.34,mlh=60;ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.roundRect(40,mY-12,W-80,fL.length*mlh+30,14);ctx.fill();ctx.font='900 48px -apple-system';ctx.fillStyle='#fff';fL.forEach((l,i)=>ctx.fillText(l,cx2,mY+12+i*mlh));const prY=mY+fL.length*mlh+70;const cc=p.ch>=0?'#00C853':'#FF1744';ctx.font='900 64px SF Mono,Menlo,monospace';ctx.fillStyle='#fff';ctx.fillText('$'+p.pr.toFixed(2),cx2,prY);ctx.font='800 28px SF Mono,Menlo,monospace';ctx.fillStyle=cc;ctx.fillText((p.ch>=0?'▲ +':'▼ ')+Math.abs(p.ch).toFixed(1)+'%',cx2,prY+42);const chY=prY+90,chW=W-100,chH=160,chX=50;let pts=[];let vv=p.pr*.9;for(let i=0;i<50;i++){vv+=(Math.random()-.44)*p.pr*.025;pts.push(Math.max(vv,p.pr*.7))}pts.push(p.pr);const mn=Math.min(...pts)*.97,mx=Math.max(...pts)*1.03;const st=chW/(pts.length-1);ctx.beginPath();ctx.moveTo(chX,chY+chH);pts.forEach((pt,i)=>{const x=chX+i*st,y=chY+chH-((pt-mn)/(mx-mn))*chH;if(i===0)ctx.lineTo(x,y);else{const px=chX+(i-1)*st,py=chY+chH-((pts[i-1]-mn)/(mx-mn))*chH;ctx.quadraticCurveTo((px+x)/2,py,x,y)}});ctx.lineTo(chX+chW,chY+chH);ctx.closePath();const cf=ctx.createLinearGradient(0,chY,0,chY+chH);cf.addColorStop(0,cc+'30');cf.addColorStop(1,'transparent');ctx.fillStyle=cf;ctx.fill();ctx.beginPath();pts.forEach((pt,i)=>{const x=chX+i*st,y=chY+chH-((pt-mn)/(mx-mn))*chH;if(i===0)ctx.moveTo(x,y);else{const px=chX+(i-1)*st,py=chY+chH-((pts[i-1]-mn)/(mx-mn))*chH;ctx.quadraticCurveTo((px+x)/2,py,x,y)}});ctx.strokeStyle=cc;ctx.lineWidth=3.5;ctx.stroke();const sy=H*.88;[{l:'SCORE',v:p.vs},{l:'xG',v:p.xg},{l:'G+A',v:p.ga},{l:'FORM',v:p.fm}].forEach((s,i)=>{const sx=W*.13+i*(W*.25);ctx.font='600 14px -apple-system';ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillText(s.l,sx,sy);ctx.font='800 24px -apple-system';ctx.fillStyle='#fff';ctx.fillText(''+s.v,sx,sy+26)});ctx.font='500 16px -apple-system';ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillText('sport.fun',cx2,H-44);const imgD=ctx.getImageData(0,0,W,H);const d=imgD.data;for(let i=0;i<d.length;i+=16){const n=(Math.random()-.5)*8;d[i]+=n;d[i+1]+=n;d[i+2]+=n}ctx.putImageData(imgD,0,0)}
function cSnap(){document.getElementById('snapOv').classList.remove('open')}
function dSnap(){const cv=document.getElementById('snapCv');const a=document.createElement('a');a.download='sportfun-'+curP.n.replace(/\s/g,'')+'.png';a.href=cv.toDataURL('image/png');a.click()}

// Theme
const tn={black:'Black',light:'Light',purple:'Purple'};
document.addEventListener('click',()=>document.getElementById('thDd').classList.remove('open'));
document.querySelectorAll('.topt').forEach(o=>o.addEventListener('click',()=>{const t=o.dataset.theme;document.documentElement.setAttribute('data-theme',t);document.querySelectorAll('.topt').forEach(x=>x.classList.remove('on'));o.classList.add('on');document.getElementById('thBtn').textContent=tn[t];document.getElementById('thDd').classList.remove('open')}));
document.querySelectorAll('.pills').forEach(g=>g.querySelectorAll('.pill').forEach(b=>b.addEventListener('click',()=>{g.querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));b.classList.add('on')})));
render();
